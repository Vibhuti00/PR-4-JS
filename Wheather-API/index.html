<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Weather App</title>
        <link rel="icon" type="image/x-icon" href="https://images.icon-icons.com/3993/PNG/512/summer_cloudy_weather_forecast_sun_breeze_wind_clouds_sunny_icon_253969.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./CSS/style.css">
    </head>
    <body>
        <div class="weather-card">
            <h3 class="text-center mb-3">Weather</h3>
            <input type="text" id="cityInput" class="form-control mb-3" placeholder="Enter The Name Of City">
            <button id="getweather" class="btn btn-primary w-100">Check Weather Today</button>
            <div id="weather" class="text-center">
                <h4 id="city"></h4>
                <p id="temperature"></p>
                <p id="description"></p>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
